<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline | COS Tesla</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8fafc;
            background-image: radial-gradient(circle at 50% 0%, hsla(221, 83%, 53%, 0.06), transparent 60%);
            color: #0f172a;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            text-align: center;
            padding: 24px;
        }
        .card {
            max-width: 380px;
            background: #ffffff;
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 10px 40px -10px rgba(15, 23, 42, 0.08), 0 1px 3px rgba(15, 23, 42, 0.04);
        }
        img { width: 64px; height: 64px; border-radius: 14px; margin-bottom: 20px; }
        h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 10px; }
        p { color: #475569; font-size: 0.95rem; line-height: 1.5; margin-bottom: 24px; }
        button {
            background: #2563eb;
            color: #ffffff;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            padding: 12px 32px;
            border-radius: 12px;
            cursor: pointer;
        }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="card">
        <img src="/logo.png" alt="COS Tesla">
        <h1>You&rsquo;re offline</h1>
        <p>COS Tesla needs a connection to load live availability and tracking. Reconnect and try again.</p>
        <button onclick="window.location.reload()">Retry</button>
    </div>
</body>
</html>
