<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline | COS Tesla</title>
    <style>
        /* Colors mirror the console-black SummitOS shell (--sos-* tokens in
           src/app/globals.css). offline.html is a standalone service-worker
           fallback, so the token values are inlined here rather than referenced. */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0a0a0a; /* --sos-bg */
            background-image: radial-gradient(circle at 50% 0%, rgba(34, 211, 238, 0.06), transparent 60%); /* --sos-accent, low alpha */
            color: #f8fafc; /* --sos-text */
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            text-align: center;
            padding: 24px;
        }
        .card {
            max-width: 380px;
            background: #111318; /* --sos-surface */
            border: 1px solid rgba(255, 255, 255, 0.08); /* --sos-border */
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.6), 0 1px 3px rgba(0, 0, 0, 0.4);
        }
        img { width: 64px; height: 64px; border-radius: 14px; margin-bottom: 20px; }
        h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 10px; color: #f8fafc; /* --sos-text */ }
        p { color: #94a3b8; /* --sos-text-dim */ font-size: 0.95rem; line-height: 1.5; margin-bottom: 24px; }
        button {
            background: #22d3ee; /* --sos-accent */
            color: #0a0a0a; /* --sos-bg — dark text for max contrast on cyan */
            border: none;
            font-size: 1rem;
            font-weight: 700;
            padding: 12px 32px;
            border-radius: 12px;
            cursor: pointer;
            transition: box-shadow 0.15s ease;
        }
        button:hover { box-shadow: 0 0 20px rgba(34, 211, 238, 0.35); /* --sos-accent-glow */ }
        button:focus-visible { outline: 3px solid #f8fafc; outline-offset: 3px; } /* --sos-text ring */
    </style>
</head>
<body>
    <div class="card">
        <img src="/logo.png" alt="COS Tesla">
        <h1>You&rsquo;re offline</h1>
        <p>COS Tesla needs a connection to load live availability and tracking. Reconnect and try again.</p>
        <button onclick="window.location.reload()">Retry</button>
    </div>
</body>
</html>
