name: Dashboard - Azure Static Web Apps CI/CD
on:
  push:
    branches:
      - master
    paths:
      - 'frontend/apps/dashboard/**'
      - '.github/workflows/azure-static-web-apps-dashboard.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master
    paths:
      - 'frontend/apps/dashboard/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Dashboard
    defaults:
      run:
        working-directory: frontend/apps/dashboard

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/apps/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Secret scan
        run: node scripts/scan-secrets.mjs --all

      - name: Artifact cleanliness check
        run: npm run check:clean

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Dependency audit (report only)
        run: npm run audit:report
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          VITE_TELLER_APPLICATION_ID: ${{ vars.VITE_TELLER_APPLICATION_ID }}

      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DASHBOARD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend/apps/dashboard/dist"
          output_location: ""
          skip_app_build: true
          skip_api_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DASHBOARD }}
          action: "close"
