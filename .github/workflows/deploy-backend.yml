name: Deploy Python Backend

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: 'summitos-api'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'backend'
  PYTHON_VERSION: '3.11'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # PHASE 0: Secret scan — fail if local.settings.json or secrets in zip
  # ─────────────────────────────────────────────────────────────
  secret_scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify local.settings.json is NOT committed
        run: |
          if find backend -name "local.settings.json" | grep -q .; then
            echo "🚨 CRITICAL: local.settings.json found in repository!"
            echo "   Remove it immediately: git rm --cached backend/local.settings.json"
            exit 1
          fi
          echo "✅ local.settings.json not present in repo."

      - name: Scan backend for embedded secret patterns
        run: |
          FAIL=0
          PATTERNS=(
            "OPENAI_API_KEY=sk-"
            "OAUTH_CLIENT_SECRET="
            "sk_live_[A-Za-z0-9]\{20\}"
          )
          # Note: AccountKey and SQL patterns are intentionally omitted because
          # GitHub secret masking replaces matched values with *** which triggers
          # false positives on the grep. These are covered by the local.settings.json check.
          for pat in "${PATTERNS[@]}"; do
            if grep -r --include="*.py" --include="*.json" --include="*.env" \
                       -l "$pat" backend/ 2>/dev/null | grep -q .; then
              echo "🚨 Secret pattern found in backend source: $pat"
              FAIL=1
            fi
          done
          if [ $FAIL -eq 1 ]; then
            echo "❌ Remove embedded secrets and use environment variables."
            exit 1
          fi
          echo "✅ No embedded secret patterns found."

  # ─────────────────────────────────────────────────────────────
  # PHASE 1: Package and verify the deployment zip
  # ─────────────────────────────────────────────────────────────
  build_and_deploy:
    name: Build and Deploy
    needs: secret_scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --target=${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/.python_packages/lib/site-packages -r ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/requirements.txt

      - name: Modify .funcignore to include .python_packages
        run: |
          sed -i '/.python_packages/d' ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/.funcignore

      - name: Verify package structure
        run: |
          echo "=== Backend directory contents ==="
          ls -la ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/
          echo ""
          echo "=== Checking for required files ==="
          for f in "function_app.py" "host.json" "requirements.txt"; do
            if [ -f "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/$f" ]; then
              echo "✅ $f present"
            else
              echo "❌ MISSING: $f"
              exit 1
            fi
          done
          echo ""
          echo "=== Verifying local.settings.json NOT in package ==="
          if [ -f "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/local.settings.json" ]; then
            echo "🚨 CRITICAL: local.settings.json would be deployed!"
            exit 1
          fi
          echo "✅ No local.settings.json in deployment package."

      - name: Clear WEBSITE_RUN_FROM_PACKAGE (pre-deploy guardrail)
        # The Azure/functions-action zipdeploy fails if this is set to a blob URL.
        # Uses the Kudu REST API with publish profile SCM credentials — no az login needed.
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_SUMMITOS_API }}
        run: |
          SCM_USER=$(echo "$PUBLISH_PROFILE" | grep -oP '(?<=userName=")[^"]+' | head -1)
          SCM_PASS=$(echo "$PUBLISH_PROFILE" | grep -oP '(?<=userPWD=")[^"]+' | head -1)
          
          # Check current value
          CURRENT_VAL=$(curl -s -u "$SCM_USER:$SCM_PASS" \
            "https://${{ env.AZURE_FUNCTIONAPP_NAME }}.scm.azurewebsites.net/api/settings/WEBSITE_RUN_FROM_PACKAGE" \
            --max-time 10 || echo "")
          echo "Current WEBSITE_RUN_FROM_PACKAGE: $CURRENT_VAL"
          
          # If the setting is a URL (starts with http) or is missing/empty/null, set it to "1"
          # so Kudu zipdeploy works correctly on the Linux Consumption plan.
          if [[ "$CURRENT_VAL" =~ ^\"http || -z "$CURRENT_VAL" || "$CURRENT_VAL" = "null" ]]; then
            echo "Setting WEBSITE_RUN_FROM_PACKAGE to 1..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -u "$SCM_USER:$SCM_PASS" \
              -X POST \
              -H "Content-Type: application/json" \
              -d '{"WEBSITE_RUN_FROM_PACKAGE": "1"}' \
              "https://${{ env.AZURE_FUNCTIONAPP_NAME }}.scm.azurewebsites.net/api/settings" \
              --max-time 15 || echo "000")
            echo "Set status: $HTTP_STATUS"
            if [ "$HTTP_STATUS" = "204" ] || [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ WEBSITE_RUN_FROM_PACKAGE successfully set to 1"
            else
              echo "⚠️  Could not update setting via Kudu API (status $HTTP_STATUS) — proceeding anyway"
            fi
          else
            echo "✅ WEBSITE_RUN_FROM_PACKAGE is already configured correctly ($CURRENT_VAL)"
          fi

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_SUMMITOS_API }}
          scm-do-build-during-deployment: false
          enable-oryx-build: false

      - name: Post-deploy smoke test
        run: |
          sleep 25
          BASE="https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api"
          PASS=0; FAIL=0
          check() {
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$2" --max-time 20 || echo "000")
            if [ "$STATUS" = "200" ]; then echo "  ✅ $1 → $STATUS"; PASS=$((PASS+1))
            else echo "  ⚠️  $1 → $STATUS"; FAIL=$((FAIL+1)); fi
          }
          echo "=== Smoke Test ==="
          check "ping"               "$BASE/ping"
          check "vehicle/status"     "$BASE/copilot/vehicle/status"
          check "tessie/day-summary" "$BASE/copilot/tessie/day-summary"
          check "metrics/summary"    "$BASE/copilot/metrics/summary?days=7"
          check "openapi.json"       "$BASE/copilot/openapi.json"
          echo "Results: $PASS passed, $FAIL warnings — Deployment complete"
