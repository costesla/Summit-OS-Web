openapi: 3.0.0
info:
  title: Summit Sync Copilot API
  description: >-
    Read-only API for Microsoft Copilot Agent to access Summit Sync trip data,
    revenue metrics, and vehicle telemetry.
  version: 1.0.0
servers:
  - url: https://func-summit-sync-prod.azurewebsites.net/api
    description: Production API
security:
  - oauth2: []

paths:
  /semantic-search:
    get:
      summary: Semantic Search
      description: Search trips using natural language queries (e.g., "starbucks runs", "airport trips last week").
      operationId: searchTripsSemantically
      parameters:
        - name: query
          in: query
          required: true
          description: Natural language search query
          schema:
            type: string
        - name: limit
          in: query
          description: Max results to return (default 5)
          schema:
            type: integer
            default: 5
      responses:
        '200':
          description: Successful search response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SemanticSearchResponse'
  /copilot/trips/latest:
    get:
      summary: Get recent trips
      description: Returns a list of recent trips from the last N days.
      operationId: getRecentTrips
      parameters:
        - name: days
          in: query
          description: Number of days to look back (default 7)
          schema:
            type: integer
            default: 7
        - name: type
          in: query
          description: Filter by trip type
          schema:
            type: string
            enum: [Uber, Private]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripListResponse'
        '429':
          description: Rate limit exceeded

  /copilot/trips/{trip_id}:
    get:
      summary: Get trip details
      description: Returns detailed information for a specific trip ID.
      operationId: getTripById
      parameters:
        - name: trip_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripDetailResponse'
        '404':
          description: Trip not found

  /copilot/metrics/daily:
    get:
      summary: Get daily metrics
      description: Returns daily revenue and trip counts for a date range.
      operationId: getDailyMetrics
      parameters:
        - name: start_date
          in: query
          in: query
          required: false
          description: Start date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          in: query
          required: false
          description: End date (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyMetricsResponse'

  /copilot/metrics/summary:
    get:
      summary: Get summary metrics
      description: Returns aggregated statistics for the last N days.
      operationId: getSummaryMetrics
      parameters:
        - name: days
          in: query
          description: Number of days to summarize (default 30)
          schema:
            type: integer
            default: 30
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummaryMetricsResponse'

  /copilot/vehicle/status:
    get:
      summary: Get vehicle status
      description: Returns current vehicle telemetry (battery, charging, location).
      operationId: getVehicleStatus
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleStatusResponse'

  /copilot/tessie/drives:
    get:
      summary: Search Tessie drives by tag
      description: >-
        Query the live Tessie API for vehicle drives, optionally filtered by a tag keyword
        (e.g. "Jackie", "Esmeralda", "Uber"). Supports filtering by a rolling day window
        or a specific calendar month. Use this to answer questions like
        "How many Jackie trips did I have this month?" or
        "Show me all Esmeralda pickups in February".
      operationId: getTessieDrivesByTag
      parameters:
        - name: tag
          in: query
          required: false
          description: Keyword to filter drives by tag (case-insensitive). E.g. "Jackie", "Esmeralda".
          schema:
            type: string
        - name: days
          in: query
          required: false
          description: Look-back window in days (default 30). Ignored if month is specified.
          schema:
            type: integer
            default: 30
        - name: month
          in: query
          required: false
          description: Target calendar month in YYYY-MM format (e.g. 2026-02). Overrides days.
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TessieDrivesResponse'

components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
          tokenUrl: https://login.microsoftonline.com/common/oauth2/v2.0/token
          scopes:
            api://summit-sync-copilot-api/.default: "Access API"

  schemas:
    Currency:
      type: object
      properties:
        amount:
          type: number
          format: float
        display:
          type: string
          example: "$123.45"
      additionalProperties: false

    TripListResponse:
      type: object
      required: [success, count, trips]
      additionalProperties: false
      properties:
        success:
          type: boolean
        count:
          type: integer
        trips:
          type: array
          items:
            type: object
            properties:
              trip_id:
                type: string
              type:
                type: string
                enum: [Uber, Private]
              timestamp:
                type: string
                format: date-time
              pickup:
                type: string
              dropoff:
                type: string
              fare:
                $ref: '#/components/schemas/Currency'
              distance_miles:
                type: number

    TripDetailResponse:
      type: object
      required: [success, trip]
      additionalProperties: false
      properties:
        success:
          type: boolean
        trip:
          type: object
          properties:
            trip_id:
              type: string
            type:
              type: string
            timestamp:
              type: string
            pickup:
              type: string
            dropoff:
              type: string
            fare:
              $ref: '#/components/schemas/Currency'
            tip:
              $ref: '#/components/schemas/Currency'
            driver_earnings:
              $ref: '#/components/schemas/Currency'
            distance_miles:
              type: number
            payment_method:
              type: string
            notes:
              type: string

    DailyMetricsResponse:
      type: object
      required: [success, metrics]
      additionalProperties: false
      properties:
        success:
          type: boolean
        metrics:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              earnings:
                $ref: '#/components/schemas/Currency'
              tips:
                $ref: '#/components/schemas/Currency'
              trip_count:
                type: integer
              miles:
                type: number

    SummaryMetricsResponse:
      type: object
      required: [success, summary]
      additionalProperties: false
      properties:
        success:
          type: boolean
        summary:
          type: object
          properties:
            total_trips:
              type: integer
            total_earnings:
              $ref: '#/components/schemas/Currency'
            total_distance:
              type: number
            average_fare:
              $ref: '#/components/schemas/Currency'

    VehicleStatusResponse:
      type: object
      required: [success, vehicle]
      additionalProperties: false
      properties:
        success:
          type: boolean
        vehicle:
          type: object
          properties:
            battery_level:
              type: integer
            range_miles:
              type: integer
            charging_state:
              type: string
            location:
              type: string
              description: City-level location only

    SemanticSearchResponse:
      type: object
      required: [count, results]
      properties:
        count:
          type: integer
        results:
          type: array
          items:
            type: object
            properties:
              score:
                type: number
              summary:
                type: string
              date:
                type: string
              amount:
                type: number
              classification:
                type: string
              source:
                type: string

    TessieDrivesResponse:
      type: object
      required: [count, drives]
      properties:
        success:
          type: boolean
        tag_filter:
          type: string
          nullable: true
        count:
          type: integer
          description: Number of matching drives found
        drives:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                description: Date of the drive in YYYY-MM-DD format (MST)
              time_mst:
                type: string
                description: Start time of the drive in HH:MM format (MST)
              tag:
                type: string
                nullable: true
                description: Tessie tag label assigned to this drive
              distance_miles:
                type: number
                description: Distance driven in miles
              start:
                type: string
                description: Full starting address
              end:
                type: string
                description: Full ending address
              starting_battery:
                type: integer
                description: Battery percentage at start of drive
              ending_battery:
                type: integer
                description: Battery percentage at end of drive
              tessie_drive_id:
                type: integer
                description: Internal Tessie drive ID
